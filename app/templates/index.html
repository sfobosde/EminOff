<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<title>Images</title>

<style>

body{
    font-family:Arial;
    margin:40px;
    background:#f5f5f5;
}

.grid{
    display:flex;
    flex-wrap:wrap;
    gap:20px;
}

.card{
    background:white;
    padding:10px;
    border-radius:8px;
    width:220px;
    box-shadow:0 2px 5px rgba(0,0,0,.1);
}

img{
    width:200px;
    height:200px;
    object-fit:cover;
}

a{
    text-decoration:none;
    color:#333;
}

.name{
    margin-top:10px;
    word-break:break-all;
    font-size:14px;
}

</style>

</head>

<body>

<h2>Uploaded Images</h2>

<div class="grid">

{% for file in files %}

<div class="card">

<a href="/image/{{ file.name }}">

<img src="/raw/{{ file.name }}">

<div class="name">

{{ file.name }}

</div>

</a>

</div>

{% endfor %}

</div>

</body>

</html>
